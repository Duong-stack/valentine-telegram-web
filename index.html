<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Valentine 💖</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffe6ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff4d6d;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yesBtn {
      background: #28a745;
      color: white;
      transform: scale(1);
    }

    #noBtn {
      background: #dc3545;
      color: white;
      transform: scale(1);
    }

    img {
      width: 180px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Giphy ban đầu -->
  <img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <h1 id="question">Cậu sẽ là Valentine của tớ chứ? 💕</h1>

  <button id="yesBtn">Đồng ý</button>
  <button id="noBtn">Từ chối</button>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const question = document.getElementById("question");
  const gif = document.getElementById("gif");

  let noScale = 1;
  let yesScale = 1;

  const questions = [
    "Cậu chắc không? 😢",
    "Suy nghĩ lại đi mà 🥺",
    "Đừng từ chối tớ mà 💔",
    "Tớ buồn đó 😭",
    "Cho tớ cơ hội nha 🥹",
    "Pleaseeee 🥰"
  ];

  let index = 0;

  // Khi bấm NO
  noBtn.addEventListener("click", () => {
    // đổi câu hỏi
    question.innerText = questions[index % questions.length];
    index++;

    // nút No nhỏ lại
    noScale -= 0.15;
    noBtn.style.transform = `scale(${noScale})`;

    // nút Yes to lên
    yesScale += 0.2;
    yesBtn.style.transform = `scale(${yesScale})`;
  });

  // Khi bấm YES
  yesBtn.addEventListener("click", () => {
    question.innerText = "Yayyyy 💖 Tớ biết mà 🥰";

    // ẩn nút
    yesBtn.style.display = "none";
    noBtn.style.display = "none";

    // đổi Giphy
    gif.src = "https://media.giphy.com/media/111ebonMs90YLu/giphy.gif";
  });
</script>

</body>
</html>
