<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Valentine Troll</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #f8dede;
}

.container {
  margin-top: 100px;
}

h1 {
  color: red;
}

img {
  width: 120px;
  margin: 20px;
}

.buttons {
  position: relative;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

#yes {
  background: #4CAF50;
  color: white;
}

#no {
  background: #ff4d4d;
  color: white;
  position: relative;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">Cậu sẽ là Valentine của tớ chứ?</h1>
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <div class="buttons">
    <button id="yes">Đồng ý</button>
    <button id="no">Từ chối</button>
  </div>
</div>

<script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let text = document.getElementById("text");

let noScale = 1;
let yesScale = 1;
let moveX = 0;

// 👉 CLICK vào "Từ chối"
noBtn.addEventListener("click", () => {

  // đổi text
  text.innerHTML = "Hãy nghĩ lại đi mà! 😭";

  // nhỏ lại
  noScale -= 0.1;
  noBtn.style.transform = `scale(${noScale})`;

  // dịch sang phải
  moveX += 20;
  noBtn.style.transform += ` translateX(${moveX}px)`;

  // nút đồng ý to ra
  yesScale += 0.15;
  yesBtn.style.transform = `scale(${yesScale})`;

  // ❌ chặn click thật (không cho submit)
  event.preventDefault();
});

// bấm đồng ý
yesBtn.addEventListener("click", () => {
  document.body.innerHTML = `
    <div style="
      background:#4CAF50;
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:100px;
      color:white;">
      Đồng ý
    </div>
  `;

  setTimeout(() => {
    document.body.innerHTML = `
      <div style="margin-top:100px;text-align:center;">
        <h1 style="color:#ff4da6">
          Yeahhh!!! Tớ biết cậu sẽ đồng ý mà ❤️❤️❤️
        </h1>
        <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="200">
      </div>
    `;
  }, 1200);
});
</script>

</body>
</html>
