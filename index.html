<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Valentine 💖</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffe6ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff4d6d;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background: #28a745;
      color: white;
    }

    #noBtn {
      background: #dc3545;
      color: white;
      position: absolute;
    }

    #result {
      font-size: 20px;
      margin-top: 20px;
      color: #ff4d6d;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="question">Cậu sẽ là Valentine của tớ chứ? 💕</h1>
  <button id="yesBtn">Đồng ý</button>
  <button id="noBtn">Từ chối</button>
  <p id="result"></p>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const result = document.getElementById("result");

  // Nút "No" chạy trốn
  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth * 0.8;
    const y = Math.random() * window.innerHeight * 0.8;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // Khi bấm YES
  yesBtn.addEventListener("click", () => {
    result.innerHTML = "Yayyyy 💖 Tớ biết mà 🥰";
  });
</script>

</body>
</html>
