<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffd6dc, #ffeef1);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Container */
.container {
  background: white;
  padding: 35px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  text-align: center;
  width: 95%;
  max-width: 500px;
}

/* GIF */
img {
  width: 100%;
  max-width: 320px;
  border-radius: 15px;
}

/* Text */
h1 {
  font-size: 24px;
  color: #ff4d6d;
  margin: 20px 0;
}

/* Buttons */
.buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

button {
  padding: 16px 24px;
  border: none;
  border-radius: 15px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

/* YES */
#yesBtn {
  background: #28a745;
  color: white;
}

/* NO */
#noBtn {
  background: #dc3545;
  color: white;
}

/* Music button */
#musicBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<button id="musicBtn">🎵</button>

<div class="container">
  <img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <h1 id="question">Cậu sẽ là Valentine của tớ chứ? 💕</h1>

  <div class="buttons">
    <button id="yesBtn">Đồng ý</button>
    <button id="noBtn">Từ chối</button>
  </div>
</div>

<!-- Nhạc -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");
const gif = document.getElementById("gif");
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");

let noScale = 1;
let yesScale = 1;
let noClickCount = 0;

const questions = [
  "Cậu chắc không? 😢",
  "Suy nghĩ lại đi mà 🥺",
  "Đừng từ chối tớ mà 💔",
  "Tớ buồn đó 😭",
  "Cho tớ cơ hội nha 🥹",
  "Pleaseeee 🥰",
  "Lần cuối hỏi đó 😤",
  "Thật luôn hả?? 😭"
];

// MUSIC toggle
musicBtn.onclick = () => {
  if (music.paused) {
    music.play();
    musicBtn.innerText = "🔊";
  } else {
    music.pause();
    musicBtn.innerText = "🎵";
  }
};

// NO click
noBtn.onclick = () => {
  question.innerText = questions[noClickCount % questions.length];
  noClickCount++;

  noScale = Math.max(0.4, noScale - 0.1);
  yesScale = Math.min(3, yesScale + 0.2);

  noBtn.style.transform = `scale(${noScale})`;
  yesBtn.style.transform = `scale(${yesScale})`;

  // Sau 8 lần thì biến mất
  if (noClickCount >= 8) {
    noBtn.style.display = "none";
  }
};

// YES click
yesBtn.onclick = () => {
  question.innerText = "Yayyyy 💖 Tớ biết mà 🥰";

  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  gif.src = "https://media.giphy.com/media/111ebonMs90YLu/giphy.gif";

  launchHearts();
};

// Hearts effect
function launchHearts() {
  for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.innerText = "💖";
    heart.className = "heart";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}
</script>

</body>
</html>
