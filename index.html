<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffd6dc, #ffeef1);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
  width: 90%;
  max-width: 350px;
}

/* GIF */
img {
  width: 100%;
  max-width: 200px;
  border-radius: 15px;
}

/* Text */
h1 {
  font-size: 20px;
  color: #ff4d6d;
  margin: 15px 0;
}

/* Buttons container */
.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
  flex-wrap: wrap;
}

/* Buttons */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.25s;
}

/* YES */
#yesBtn {
  background: #28a745;
  color: white;
}

/* NO */
#noBtn {
  background: #dc3545;
  color: white;
}

/* Mobile fix */
@media (max-width: 400px) {
  h1 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">
  <img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <h1 id="question">Cậu sẽ là Valentine của tớ chứ? 💕</h1>

  <div class="buttons">
    <button id="yesBtn">Đồng ý</button>
    <button id="noBtn">Từ chối</button>
  </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");
const gif = document.getElementById("gif");

let noScale = 1;
let yesScale = 1;

const questions = [
  "Cậu chắc không? 😢",
  "Suy nghĩ lại đi mà 🥺",
  "Đừng từ chối tớ mà 💔",
  "Tớ buồn đó 😭",
  "Cho tớ cơ hội nha 🥹",
  "Pleaseeee 🥰"
];

let index = 0;

// CLICK NO
noBtn.addEventListener("click", () => {
  question.innerText = questions[index % questions.length];
  index++;

  // Giới hạn scale để không vỡ UI
  noScale = Math.max(0.5, noScale - 0.1);
  yesScale = Math.min(2.5, yesScale + 0.15);

  noBtn.style.transform = `scale(${noScale})`;
  yesBtn.style.transform = `scale(${yesScale})`;
});

// CLICK YES
yesBtn.addEventListener("click", () => {
  question.innerText = "Yayyyy 💖 Tớ biết mà 🥰";

  // Ẩn nút
  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  // Đổi GIF
  gif.src = "https://media.giphy.com/media/111ebonMs90YLu/giphy.gif";

  // Hiệu ứng nổ nhẹ
  document.body.style.background = "#ffccd5";
});
</script>

</body>
</html>
