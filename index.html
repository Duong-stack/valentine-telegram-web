<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 😏</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #ffe6f0;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
}

img {
  width: 80%;
  max-width: 350px;
  border-radius: 15px;
  transition: opacity 0.3s;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

#noBtn {
  background: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">Làm người yêu mình nhé? 😳</h1>

  <img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <div class="buttons">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 😢</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="yesSound" src="yes.mp3"></audio>
<audio id="noSound" src="no.mp3"></audio>
<audio id="bgMusic" src="bg.mp3" loop></audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const gif = document.getElementById("gif");
const question = document.getElementById("question");

const yesSound = document.getElementById("yesSound");
const noSound = document.getElementById("noSound");
const bgMusic = document.getElementById("bgMusic");

// autoplay fix
document.body.addEventListener("click", () => {
  bgMusic.play().catch(()=>{});
}, { once: true });

// danh sách gif NO (không trùng)
const noGifs = [
  "https://media.giphy.com/media/3o6ZtaO9BZHcOjmErm/giphy.gif",
  "https://media.giphy.com/media/l378khQxt68syiWJy/giphy.gif",
  "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif",
  "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif",
  "https://media.giphy.com/media/ROF8OQvDmxytW/giphy.gif",
  "https://media.giphy.com/media/j5QcmXoFWl4Q0/giphy.gif",
  "https://media.giphy.com/media/9Y5BbDSkSTiY8/giphy.gif",
  "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
];

let noCount = 0;

// đổi gif (fix chồng gif)
function changeGif(newGif) {
  gif.style.opacity = 0;

  setTimeout(() => {
    gif.src = newGif;
    gif.style.opacity = 1;
  }, 200);
}

// NO click
noBtn.onclick = () => {
  noSound.currentTime = 0;
  noSound.play();

  if (noCount < noGifs.length) {
    changeGif(noGifs[noCount]);
  }

  noCount++;

  // NO nhỏ dần
  let scale = 1 - noCount * 0.1;
  noBtn.style.transform = `scale(${scale})`;

  // YES to dần
  let yesScale = 1 + noCount * 0.2;
  yesBtn.style.transform = `scale(${yesScale})`;

  // đổi câu hỏi
  question.innerText = "Suy nghĩ lại đi mà 🥺";

  // sau 8 lần → ẩn NO
  if (noCount >= 8) {
    noBtn.style.display = "none";
  }
};

// YES click
yesBtn.onclick = () => {
  yesSound.currentTime = 0;
  yesSound.play();

  changeGif("https://media.giphy.com/media/3oz8xAFtqoOUUrsh7W/giphy.gif");

  question.innerText = "Yayyyy 💖💖💖";

  // ẩn YES
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
};
</script>

</body>
</html>
