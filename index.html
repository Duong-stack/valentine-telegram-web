<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cẩn thận bắt sáng cam 💖</title>
<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e0,#ffe6f0);
  flex-direction:column;
}
#gifContainer {
  z-index:1;
}
#mainGif {
  width:400px;
  max-width:80vw;
  margin-bottom:20px;
}
#buttonRow {
  display:flex;
  gap:20px;
}
button {
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition: all 0.3s ease;
}
#yesBtn { background:#28a745; color:white;}
#noBtn { background:#dc3545; color:white; position:relative; }
</style>
</head>
<body>
<div id="gifContainer">
  <img id="mainGif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
</div>
<div id="buttonRow">
  <button id="yesBtn">Đồng ý 💖</button>
  <button id="noBtn">Từ chối 😢</button>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let hoverCount = 0;
const maxHover = 6;
const yesOriginalSize = 18; // px font-size
let yesFontSize = yesOriginalSize;

noBtn.addEventListener("mouseover", () => {
  if (hoverCount >= maxHover) return;
  hoverCount++;

  // Di chuyển nút từ chối sang trái một chút
  const currentLeft = noBtn.offsetLeft;
  noBtn.style.transform = `translateX(-${10 * hoverCount}px)`;

  // Tăng font-size nút Đồng ý dần dần
  yesFontSize += 4;
  yesBtn.style.fontSize = yesFontSize + "px";

  // Lần thứ 6 → biến mất nút từ chối & phóng to nút đồng ý
  if (hoverCount === maxHover) {
    noBtn.style.display = "none";
    yesBtn.style.fontSize = "100px";
    yesBtn.style.width = "80vw";
    yesBtn.style.height = "80vh";
  }
});

// Bấm Đồng ý
yesBtn.addEventListener("click", () => {
  alert("Cậu đã chọn Đồng ý 💖");
});
</script>
</body>
</html>
