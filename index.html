<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Valentine Troll</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #f8dede;
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

h1 {
  color: red;
  transition: 0.3s;
}

img {
  width: 150px;
  margin: 20px;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
  transition: 0.2s;
}

#yes {
  background: #4CAF50;
  color: white;
}

#no {
  background: #ff4d4d;
  color: white;
  position: absolute;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">Cậu sẽ là Valentine của tớ chứ?</h1>
  <img id="img" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <div class="buttons">
    <button id="yes">Đồng ý</button>
    <button id="no">Từ chối</button>
  </div>
</div>

<script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let text = document.getElementById("text");
let img = document.getElementById("img");

let scale = 1;

// Hover nút "Từ chối"
noBtn.addEventListener("mouseover", () => {

  // đổi text
  text.innerHTML = "Thôi mà, nhấn Đồng ý đi mà 🥺";

  // nút nhỏ lại
  scale -= 0.1;
  noBtn.style.transform = `scale(${scale})`;

  // chạy lung tung
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// Bấm "Đồng ý"
yesBtn.addEventListener("click", () => {

  // màn hình xanh
  document.body.innerHTML = `
    <div style="
      background:#4CAF50;
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:100px;
      color:white;
    ">
      Đồng ý
    </div>
  `;

  // chuyển cảnh sau 1s
  setTimeout(() => {
    document.body.innerHTML = `
      <div style="margin-top:100px;text-align:center;">
        <h1 style="color:#ff4da6">
          Yeahhh!!! Tớ biết cậu sẽ đồng ý mà ❤️❤️❤️
        </h1>
        <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="200">
      </div>
    `;
  }, 1200);
});
</script>

</body>
</html>
